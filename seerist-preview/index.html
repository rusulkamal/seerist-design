<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover – Preview Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F1F5F9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; color: #0F172A; }

    /* ── Topbar ── */
    .topbar {
      height: 52px; background: #fff; border-bottom: 1px solid #E2E8F0;
      display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
    }
    .topbar-logo  { font-size: 15px; font-weight: 700; color: #00A651; }
    .topbar-sep   { width: 1px; height: 20px; background: #E2E8F0; }
    .topbar-title { font-size: 14px; font-weight: 600; color: #1E293B; }
    .topbar-count { font-size: 13px; color: #94A3B8; }
    .topbar-right { margin-left: auto; display: flex; gap: 8px; }
    .tb-btn {
      height: 32px; padding: 0 12px; border-radius: 6px;
      border: 1px solid #E2E8F0; background: #fff;
      font-size: 13px; font-family: inherit; color: #475569; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .tb-btn:hover { background: #F8FAFC; }

    /* ── Layout ── */
    .main { flex: 1; display: flex; overflow: hidden; }

    .list-pane {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 0;
    }
    .card { width: 560px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 0;
      padding: 14px 16px 12px;
      cursor: pointer;
      position: relative;
      transition: background .12s;
    }
    .card + .card { margin-top: -1px; }
    .card:first-child { border-radius: 8px 8px 0 0; }
    .card:last-child  { border-radius: 0 0 8px 8px; }
    .card:hover { background: #FAFBFC; }
    .card.previewing { border-left: 2px solid #00A651; background: #FAFBFC; }

    /* Eyebrow row */
    .eyebrow {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    }
    .ct-icon { color: #64748B; font-size: 12px; flex-shrink: 0; }
    .eyebrow-meta { font-size: 12px; color: #475569; flex: 1; }
    .eyebrow-meta b { font-weight: 500; }

    /* Status badge — outlined pill */
    .status-badge {
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 20px; flex-shrink: 0;
      border: 1px solid #CBD5E1; color: #475569; background: #fff;
    }
    .status-unverified { border-color: #CBD5E1; color: #64748B; }
    .status-future     { border-color: #93C5FD; color: #1D4ED8; background: #EFF6FF; }
    .status-verified   { border-color: #86EFAC; color: #15803D; background: #F0FDF4; }
    .status-breaking   { border-color: #FCA5A5; color: #B91C1C; background: #FFF1F2; }

    .more-btn {
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; color: #CBD5E1; font-size: 13px; z-index: 2;
    }
    .card:hover .more-btn { color: #94A3B8; }
    .more-btn:hover { background: #F1F5F9; color: #475569 !important; }

    /* Title */
    .card-title {
      font-size: 13.5px; font-weight: 600; color: #0F172A;
      line-height: 1.45; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Location row */
    .card-locations { display: flex; align-items: center; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
    .loc-pill {
      display: flex; align-items: center; gap: 5px;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      border-radius: 20px; padding: 3px 9px;
      font-size: 12px; color: #334155;
    }
    .loc-more {
      font-size: 12px; color: #64748B;
      background: #F1F5F9; border-radius: 20px; padding: 3px 8px;
    }

    /* Severity tag */
    .severity-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 8px;
    }
    .sev-high   { background: #FFF1F2; color: #BE123C; }
    .sev-medium { background: #FFF7ED; color: #C2410C; }
    .sev-low    { background: #F0FDF4; color: #15803D; }

    /* Source line */
    .card-source { font-size: 11.5px; color: #94A3B8; }
    .card-source span { color: #64748B; font-style: italic; }

    /* Preview button — hover reveal, bottom-right */
    .preview-btn {
      position: absolute; bottom: 11px; right: 14px;
      display: flex; align-items: center; gap: 5px;
      background: #fff; border: 1px solid #E2E8F0;
      border-radius: 6px; padding: 4px 10px;
      font-size: 12px; font-weight: 500; color: #475569;
      font-family: inherit; cursor: pointer;
      opacity: 0; transform: translateY(2px);
      transition: opacity .15s, transform .15s, border-color .12s, color .12s, background .12s;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      z-index: 2;
    }
    .card:hover .preview-btn { opacity: 1; transform: translateY(0); }
    .preview-btn:hover { border-color: #00A651; color: #00A651; background: #F0FDF4; }

    /* ── Preview Panel — slides in from right ── */
    .preview-panel {
      position: fixed; top: 52px; right: 0; bottom: 0; width: 520px;
      background: #fff; border-left: 1px solid #E2E8F0;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease;
      z-index: 50;
    }
    .preview-panel.open { transform: translateX(0); }
    .pp-inner { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

    .pp-header {
      padding: 12px 16px; border-bottom: 1px solid #E2E8F0;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .pp-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11.5px; font-weight: 500; padding: 3px 10px; border-radius: 20px;
      background: #F1F5F9; color: #475569; border: 1px solid #E2E8F0;
    }
    .pp-type-badge i { font-size: 10px; }
    .pp-nav { display: flex; gap: 2px; }
    .pp-nav-btn {
      width: 28px; height: 28px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #64748B; cursor: pointer; border: none; background: none;
    }
    .pp-nav-btn:hover:not(:disabled) { background: #F1F5F9; }
    .pp-nav-btn:disabled { color: #CBD5E1; cursor: default; }
    .pp-spacer { flex: 1; }
    .pp-icon-btn {
      width: 28px; height: 28px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #64748B; cursor: pointer; border: none; background: none;
    }
    .pp-icon-btn:hover { background: #F1F5F9; }

    .pp-body { flex: 1; overflow-y: auto; padding: 20px; }
    .pp-date { font-size: 12px; color: #94A3B8; margin-bottom: 8px; }
    .pp-title { font-size: 18px; font-weight: 700; color: #0F172A; line-height: 1.4; margin-bottom: 18px; }

    /* Social content block */
    .pp-social {
      background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 18px;
    }
    .pp-social-author {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .pp-social-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1D9BF0; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; flex-shrink: 0;
    }
    .pp-social-name { font-size: 13px; font-weight: 600; color: #0F172A; }
    .pp-social-handle { font-size: 12px; color: #64748B; }
    .pp-social-text { font-size: 13.5px; color: #1E293B; line-height: 1.6; }

    .pp-meta { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .pp-meta-row { display: flex; gap: 10px; align-items: flex-start; }
    .pp-meta-key {
      font-size: 11px; font-weight: 600; color: #94A3B8;
      text-transform: uppercase; letter-spacing: .05em;
      width: 100px; flex-shrink: 0; padding-top: 2px;
    }
    .pp-meta-val { font-size: 13px; color: #334155; line-height: 1.5; }
    .val-high   { color: #BE123C; font-weight: 600; }
    .val-medium { color: #C2410C; font-weight: 600; }
    .val-low    { color: #15803D; font-weight: 600; }
    .val-negative { color: #BE123C; font-weight: 500; }
    .val-positive { color: #15803D; font-weight: 500; }
    .val-neutral  { color: #475569; font-weight: 500; }

    .pp-divider { height: 1px; background: #F1F5F9; margin: 16px 0; }
    .pp-section { font-size: 11px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .pp-text { font-size: 13.5px; color: #334155; line-height: 1.7; margin-bottom: 10px; }

    .pp-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pp-pill {
      display: flex; align-items: center; gap: 5px;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #334155;
    }
    .pp-locs { display: flex; flex-wrap: wrap; gap: 7px; }
    .pp-loc {
      display: flex; align-items: center; gap: 5px;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #334155;
    }
    .pp-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .pp-tag { background: #F1F5F9; color: #475569; font-size: 12px; padding: 4px 10px; border-radius: 5px; }

    .pp-footer {
      padding: 10px 16px; border-top: 1px solid #E2E8F0;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .btn-footer {
      height: 32px; padding: 0 12px; border-radius: 6px; font-family: inherit;
      font-size: 12.5px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; white-space: nowrap;
      border: 1px solid #E2E8F0; background: #fff; color: #374151;
      transition: background .12s, border-color .12s;
    }
    .btn-footer:hover { background: #F8FAFC; border-color: #CBD5E1; }
    .btn-footer.primary {
      background: #00A651; color: #fff; border-color: #00A651;
    }
    .btn-footer.primary:hover { background: #009144; border-color: #009144; }
    .btn-copy {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid #E2E8F0;
      background: #fff; color: #64748B; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s;
    }
    .btn-copy:hover { background: #F1F5F9; color: #1E293B; }
    .btn-primary i { font-size: 11px; opacity: .85; }
  </style>
</head>

        <div class="pp-footer">
          <button class="btn-copy" title="Copy link"><i class="fa-regular fa-copy"></i></button>
          <button class="btn-footer" style="margin-left:auto">Save to Content Folder</button>
          <button class="btn-footer primary">View Details</button>
        </div>
      </div>

  </div>

      },
      {

        regions: ['Europe', 'Americas'],
        social: null,
        summary: ['Multiple protest groups are coordinating a large-scale demonstration near the Houses of Parliament, expected to draw tens of thousands of participants. Metropolitan Police have issued advance notice of road closures and transit disruptions across Westminster beginning Tuesday morning.', 'Security services assessed the event as low risk for violence but high impact for movement and access. Business operations within a 2km radius may experience significant disruption.'],
        allLocations: [{ flag: '🇬🇧', name: 'United Kingdom' }, { flag: '🇨🇦', name: 'Canada' }, { flag: '🇦🇺', name: 'Australia' }, { flag: '🇩🇪', name: 'Germany' }, { flag: '🇫🇷', name: 'France' }, { flag: '🇧🇷', name: 'Brazil' }],
        topics: ['Civil Unrest', 'Security', 'Mass Gathering', 'UK Politics', 'Travel Disruption'],

      {

        date: 'Apr 14, 2025', category: 'Events',
        status: 'Verified', statusClass: 'status-verified',
        title: 'Infrastructure disruption reported across eastern districts following overnight storm damage',

        summary: ['French authorities announced early lifting of travel restrictions on three northern provinces, originally scheduled until 20 April. Effective immediately.', 'Belgian border crossings return to normal operations from Tuesday 09:00 local time.'],

        relevance: 'High', relevanceClass: 'val-high',
        summary: ['Spanish air traffic controllers announced a 72-hour strike beginning Wednesday 06:00. Madrid Barajas and Barcelona El Prat expected at 30–40% capacity.', 'Airlines cancelling and rebooking affected flights. Alternative routing through Lisbon or Paris recommended.'],
        allLocations: [{ flag: '🇪🇸', name: 'Spain' }, { flag: '🇵🇹', name: 'Portugal' }, { flag: '🇫🇷', name: 'France' }, { flag: '🇮🇹', name: 'Italy' }],
        topics: ['Travel Disruption', 'Labour Action', 'Aviation', 'Strike Action'],
      },
      {
        icon: 'fa-chart-line', type: 'Scenario', typeClass: 'sev-medium',
        date: 'Apr 12, 2025', category: 'Scenario',
        status: 'Unverified', statusClass: 'status-unverified',
        title: 'Escalation scenario: political crisis in Southeast Asia may affect regional supply chains Q2 2025',
        locations: [
          { flag: '🇲🇾', name: 'Malaysia' },
          { flag: '🇸🇬', name: 'Singapore' },
        ],
        locationOverflow: 3,
        severity: 'Medium Severity', sevClass: 'sev-medium',
        sourceUri: 'analyst-team', sourceDate: 'Apr 12 2025, 16:00 UTC',
        relevance: 'Medium', relevanceClass: 'val-medium',
        summary: ['Ongoing political instability in Malaysia presents a plausible escalation scenario in which governmental deadlock leads to early elections, causing 6–8 weeks of policy uncertainty.', 'Regional supply chain exposure most acute in semiconductor precursors. Probability assessed at 25–35% within Q2 2025.'],
        allLocations: [{ flag: '🇲🇾', name: 'Malaysia' }, { flag: '🇸🇬', name: 'Singapore' }, { flag: '🇹🇭', name: 'Thailand' }, { flag: '🇻🇳', name: 'Vietnam' }, { flag: '🇮🇩', name: 'Indonesia' }],
        topics: ['Political Risk', 'Supply Chain', 'Elections', 'Southeast Asia'],
      },
    ];

    let activeIndex = -1;

    function renderCards() {
      const pane = document.getElementById('listPane');
      pane.innerHTML = '';
      cards.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'card' + (i === activeIndex ? ' previewing' : '');

        const locsHtml = c.locations.map(l =>
          `<div class="loc-pill">${l.flag} ${l.name}</div>`
        ).join('') + (c.locationOverflow > 0 ? `<div class="loc-more">+${c.locationOverflow}</div>` : '');

        el.innerHTML = `
          <div class="eyebrow">
            <i class="fa-solid ${c.icon} ct-icon"></i>
            <span class="eyebrow-meta">${c.date} &bull; ${c.category}</span>
            <span class="status-badge ${c.statusClass}">${c.status}</span>
            <div class="more-btn" data-stop><i class="fa-solid fa-ellipsis-vertical"></i></div>
          </div>
          <div class="card-title">${c.title}</div>
          <div class="card-locations">${locsHtml}</div>
          <div class="severity-tag ${c.sevClass}">${c.severity}</div>
          <div class="card-source"><span>${c.sourceUri}</span> &nbsp;Published: ${c.sourceDate}</div>
          <button class="preview-btn" data-stop data-preview="${i}">
            Preview
          </button>
        `;

        el.addEventListener('click', (e) => {
          if (e.target.closest('[data-stop]')) return;
          alert('→ Opens full article page');
        });

        pane.appendChild(el);
      });

      document.querySelectorAll('[data-preview]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openPanel(parseInt(btn.dataset.preview));
        });
      });
    }

    function openPanel(index) {
      activeIndex = index;
      const c = cards[index];

      document.getElementById('ppBadge').className = 'pp-type-badge';
      document.getElementById('ppBadge').style.cssText = '';
      document.getElementById('ppBadge').innerHTML = c.type === 'X'
        ? `<i class="fa-solid fa-newspaper"></i> News &amp; Social`
        : `<i class="fa-solid ${c.icon}"></i> ${c.type}`;
      document.getElementById('navUp').disabled   = index === 0;
      document.getElementById('navDown').disabled = index === cards.length - 1;

      const socialBlock = c.social ? `
        <div class="pp-social">
          <div class="pp-social-author">
            <div class="pp-social-avatar"><i class="fa-brands fa-x-twitter"></i></div>
            <div>
              <div class="pp-social-name">${c.social.authorName}</div>
              <div class="pp-social-handle">${c.social.authorHandle}</div>
            </div>
          </div>
          <div class="pp-social-text">${c.social.text}</div>
        </div>` : '';

      const summaryBlock = c.summary ? `
        <div class="pp-divider"></div>
        <div class="pp-section">Summary</div>
        ${c.summary.map(p => `<div class="pp-text">${p}</div>`).join('')}` : '';

      document.getElementById('ppBody').innerHTML = `
        <div class="pp-date">${c.date}</div>
        <div class="pp-title">${c.title}</div>
        ${socialBlock}
        <div class="pp-meta">
          <div class="pp-meta-row"><span class="pp-meta-key">Provider</span><span class="pp-meta-val">${c.provider}</span></div>
          ${c.author ? `<div class="pp-meta-row"><span class="pp-meta-key">Author</span><span class="pp-meta-val">${c.author}</span></div>` : ''}
          <div class="pp-meta-row"><span class="pp-meta-key">Sentiment</span><span class="pp-meta-val ${c.sentimentClass}">${c.sentiment}</span></div>
          <div class="pp-meta-row"><span class="pp-meta-key">Published</span><span class="pp-meta-val">${c.published}</span></div>
          <div class="pp-meta-row"><span class="pp-meta-key">Occurred</span><span class="pp-meta-val">${c.occurred}</span></div>
          <div class="pp-meta-row"><span class="pp-meta-key">Last Updated</span><span class="pp-meta-val">${c.lastUpdated}</span></div>
          <div class="pp-meta-row"><span class="pp-meta-key">Language</span><span class="pp-meta-val">${c.language}</span></div>
        </div>
        ${summaryBlock}
        <div class="pp-divider"></div>
        <div class="pp-section">Topics</div>
        <div class="pp-tags" style="margin-bottom:14px">${c.topics.map(t => `<span class="pp-tag">${t}</span>`).join('')}</div>
        <div class="pp-section">Countries</div>
        <div class="pp-pills" style="margin-bottom:14px">${c.countries.map(l => `<div class="pp-pill">${l.flag} ${l.name}</div>`).join('')}</div>
        <div class="pp-section">Regions</div>
        <div class="pp-pills">${c.regions.map(r => `<div class="pp-pill"><i class="fa-solid fa-earth-asia" style="font-size:10px;color:#94A3B8"></i> ${r}</div>`).join('')}</div>
      `;

      document.getElementById('previewPanel').classList.add('open');
      document.getElementById('listPane').classList.add('compressed');
      renderCards();
    }

    function closePanel() {
      activeIndex = -1;
      document.getElementById('previewPanel').classList.remove('open');
      document.getElementById('listPane').classList.remove('compressed');
      renderCards();
    }

    function navigate(dir) {
      const next = activeIndex + dir;
      if (next >= 0 && next < cards.length) openPanel(next);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePanel();
      if (activeIndex > -1 && (e.key === 'j' || e.key === 'ArrowDown')) { e.preventDefault(); navigate(1); }
      if (activeIndex > -1 && (e.key === 'k' || e.key === 'ArrowUp'))   { e.preventDefault(); navigate(-1); }
    });

    renderCards();
    openPanel(0);
  </script>
</body>
</html>
