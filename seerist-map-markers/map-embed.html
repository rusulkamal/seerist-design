html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;}
#map{width:100%;height:100%;}

.top-nav{height:44px;background:#0f1117;border-bottom:1px solid #1e2030;display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:100;}
.top-nav-brand{display:flex;align-items:center;gap:8px;padding-right:20px;border-right:1px solid #1e2030;margin-right:4px;}
.top-nav-mark{width:20px;height:20px;border-radius:4px;background:linear-gradient(135deg,#10b981,#99cc10);flex-shrink:0;}
.top-nav-wordmark{font-size:11px;font-weight:700;letter-spacing:.12em;color:#fff;}
.top-nav-tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:44px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;text-decoration:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.top-nav-tab:hover{color:#94a3b8;}
.top-nav-tab.active{color:#fff;border-bottom-color:#fff;}
.top-nav-tab i{font-size:11px;}

body.embed .top-nav{display:none;}
body.embed #map{height:100vh;}
#overlay{position:absolute;inset:0;pointer-events:none;z-index:11;}
#clusters{position:absolute;inset:0;pointer-events:none;z-index:13;}

.event-marker{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 3px 10px rgba(0,0,0,.2);cursor:pointer;color:#78716c;pointer-events:auto;position:relative;}
.event-marker:hover{filter:brightness(.92);}
.event-marker.selected{box-shadow:0 0 0 3px rgba(100,116,139,.35),0 0 0 7px rgba(100,116,139,.1),0 3px 12px rgba(0,0,0,.2);}

@keyframes pulse{0%{transform:scale(.9);opacity:.7;}100%{transform:scale(2.6);opacity:0;}}
@keyframes pulse2{0%{transform:scale(.9);opacity:.5;}100%{transform:scale(2.2);opacity:0;}}
.pulse-ring{position:absolute;inset:0;border-radius:50%;border:2px solid currentColor;pointer-events:none;animation:pulse 2s ease-out infinite;}
.pulse-ring2{position:absolute;inset:0;border-radius:50%;border:2px solid currentColor;pointer-events:none;animation:pulse2 2s ease-out infinite;animation-delay:.5s;}

.cluster-bubble{border-radius:50%;background:#fff;border:2px solid #94a3b8;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#334155;box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;pointer-events:auto;}

const map = new maplibregl.Map({
  container:'map',
  style:'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center:[20,20], zoom:2.2,
  attributionControl:false,
});

const overlay  = document.getElementById('overlay');
const clusterL = document.getElementById('clusters');
let markerEls  = [];

function project(lnglat){
  const p = map.project(lnglat);
  return {x:p.x, y:p.y};
}

function refresh(){
  overlay.innerHTML  = '';
  clusterL.innerHTML = '';
  markerEls = [];

  const zoom = map.getZoom();
  const cell = zoom < 1.5 ? 999 : zoom < 2.5 ? 22 : zoom < 3 ? 14 : zoom < 4 ? 7 : zoom < 5 ? 3.5 : zoom < 6 ? 1.8 : zoom < 7 ? 0.9 : 0;

  if(cell === 0){
    EVENTS.forEach((ev,i) => placeMarker(ev, i));
  } else {
    const groups = {};
    EVENTS.forEach(ev => {
      const k = `${Math.floor(ev.lnglat[0]/cell)},${Math.floor(ev.lnglat[1]/cell)}`;
      (groups[k] = groups[k]||[]).push(ev);
    });
    Object.values(groups).forEach(grp => {
      if(grp.length === 1){ placeMarker(grp[0], 0); return; }
      const cx = grp.reduce((s,e)=>s+e.lnglat[0],0)/grp.length;
      const cy = grp.reduce((s,e)=>s+e.lnglat[1],0)/grp.length;
      placeCluster([cx,cy], grp.length);
    });
  }
}

function placeMarker(ev, idx){
  const color = SEV_COLOR[ev.sev] || '#78716c';
  const {x,y} = project(ev.lnglat);
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:absolute;left:${x-15}px;top:${y-15}px;width:30px;height:30px;pointer-events:none;`;

  if(ev.status === 'breaking'){
    const r1 = document.createElement('div');
    r1.className = 'pulse-ring';
    r1.style.color = color;
    r1.style.animationDelay = `${idx*0.28}s`;
    const r2 = document.createElement('div');
    r2.className = 'pulse-ring2';
    r2.style.color = color;
    r2.style.animationDelay = `${idx*0.28+0.5}s`;
    wrap.appendChild(r1);
    wrap.appendChild(r2);
  }

  const el = document.createElement('div');
  el.className = 'event-marker';
  el.style.color = color;
  el.innerHTML = `<i class="fa-solid ${ev.icon}"></i>`;
  el.style.pointerEvents = 'auto';
  wrap.appendChild(el);
  overlay.appendChild(wrap);
  markerEls.push({ev, wrap});
}

function placeCluster(lnglat, count){
  const {x,y} = project(lnglat);
  const sz = count > 20 ? 46 : count > 7 ? 40 : 34;
  const el = document.createElement('div');
  el.className = 'cluster-bubble';
  el.style.cssText = `position:absolute;left:${x-sz/2}px;top:${y-sz/2}px;width:${sz}px;height:${sz}px;`;
  el.textContent = count > 99 ? '99+' : count;
  el.addEventListener('click', e => { e.stopPropagation(); map.easeTo({center:lnglat,zoom:map.getZoom()+2.5}); });
  clusterL.appendChild(el);
}

map.on('load', refresh);
