<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Search Map · Seerist</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;color:#1e293b;font-size:13px;}

/* ── Top nav ── */
.top-nav{height:44px;background:#0f1117;border-bottom:1px solid #1e2030;display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:100;}
.top-nav-brand{display:flex;align-items:center;gap:8px;padding-right:20px;border-right:1px solid #1e2030;margin-right:4px;}
.top-nav-mark{width:20px;height:20px;border-radius:4px;background:linear-gradient(135deg,#10b981,#99cc10);flex-shrink:0;}
.top-nav-wordmark{font-size:11px;font-weight:700;letter-spacing:.12em;color:#fff;}
.top-nav-tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:44px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;text-decoration:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.top-nav-tab:hover{color:#94a3b8;}
.top-nav-tab.active{color:#fff;border-bottom-color:#fff;}
.top-nav-tab i{font-size:11px;}

/* ── Search header ── */
.search-header{height:44px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.sh-title{font-size:14px;font-weight:700;color:#0f1117;}
.sh-count{font-size:12px;color:#94a3b8;font-weight:400;}
.sh-spacer{flex:1;}
.sh-btn{display:flex;align-items:center;gap:6px;padding:0 12px;height:30px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-family:'Inter',sans-serif;font-size:12px;color:#44403c;cursor:pointer;white-space:nowrap;transition:background .1s;}
.sh-btn:hover{background:#f8fafc;}
.sh-btn i{font-size:11px;color:#94a3b8;}
.sh-save{display:flex;align-items:center;gap:6px;padding:0 14px;height:30px;background:#1e293b;color:#fff;border:none;border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s;}
.sh-save:hover{background:#334155;}
.sh-save i{font-size:11px;}

/* ── Search bar row ── */
.search-bar-row{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.search-input-wrap{display:flex;align-items:center;gap:8px;border:1px solid #e2e8f0;border-radius:8px;padding:0 10px;height:36px;min-width:360px;flex:1;background:#fff;transition:border-color .15s;}
.search-input-wrap:focus-within{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(0,0,0,.05);}
.search-input-wrap > i{color:#94a3b8;font-size:13px;flex-shrink:0;}
.search-input-wrap input{flex:1;border:none;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:#1e293b;background:transparent;}
.builder-chip{display:flex;align-items:center;gap:5px;padding:0 10px;height:24px;background:#1e293b;color:#fff;border:none;border-radius:5px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.builder-chip i{font-size:10px;}
.info-icon{color:#94a3b8;font-size:13px;cursor:pointer;flex-shrink:0;padding:0 2px;}

.filter-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.filter-chip{display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;border:1px solid #e2e8f0;border-radius:7px;background:#fff;font-family:'Inter',sans-serif;font-size:12px;color:#44403c;cursor:pointer;white-space:nowrap;transition:border-color .15s,background .1s;}
.filter-chip:hover{background:#f8fafc;border-color:#cbd5e1;}
.filter-chip i.fa-chevron-down{font-size:9px;color:#94a3b8;}
.filter-chip i:first-child{font-size:11px;color:#64748b;}

/* ── Tabs ── */
.tabs-row{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 16px;display:flex;align-items:center;gap:0;flex-shrink:0;}
.tab-btn{padding:0 16px;height:38px;border:none;border-bottom:2px solid transparent;background:transparent;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;transition:color .15s,border-color .15s;}
.tab-btn.active{color:#0f1117;border-bottom-color:#0f1117;font-weight:600;}
.tab-btn:hover:not(.active){color:#334155;}

/* ── Main ── */
.main-wrap{display:flex;height:calc(100vh - 44px - 44px - 57px - 38px);overflow:hidden;}

/* ── Results panel ── */
.results-panel{width:380px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;}
.sort-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #f1f5f9;flex-shrink:0;}
.sort-check{width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.sort-label{display:flex;align-items:center;gap:5px;font-size:12px;color:#44403c;cursor:pointer;font-weight:500;}
.sort-label i{font-size:10px;color:#94a3b8;}
.sort-spacer{flex:1;}
.more-btn{border:none;background:transparent;color:#94a3b8;font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}

.results-list{flex:1;overflow-y:auto;}
.results-list::-webkit-scrollbar{width:4px;}
.results-list::-webkit-scrollbar-track{background:transparent;}
.results-list::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}

/* ── Result card ── */
.result-card{padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;}
.result-card:hover{background:#fafafa;}
.result-card.active{background:#f1f5f9;}

.card-top-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.card-check{width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.card-type-icon{font-size:12px;color:#94a3b8;flex-shrink:0;}
.card-time{font-size:11px;color:#94a3b8;flex-shrink:0;}
.card-cat{font-size:11px;color:#64748b;flex-shrink:0;}
.card-more{margin-left:auto;border:none;background:transparent;color:#94a3b8;font-size:14px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}

/* Severity + status chips */
.chip{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:4px;font-size:10px;font-weight:600;flex-shrink:0;}
.chip-sev-low{background:#f1f5f9;color:#64748b;}
.chip-sev-medium{background:#ffedd5;color:#c2410c;}
.chip-sev-high{background:#fee2e2;color:#b91c1c;}
.chip-status-unverified{background:#f1f5f9;color:#64748b;}
.chip-status-verified{background:#f1f5f9;color:#475569;}
.chip-status-breaking{background:#fef2f2;color:#dc2626;}
.chip-status-future{background:#eff6ff;color:#2563eb;}

.card-title{font-size:13px;font-weight:600;color:#1e293b;line-height:1.45;margin-bottom:6px;}
.card-locations{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.card-loc{display:flex;align-items:center;gap:4px;font-size:11.5px;color:#44403c;}
.card-loc-flag{font-size:13px;line-height:1;}
.card-source{font-size:11px;color:#94a3b8;margin-bottom:4px;}
.card-occurred{font-size:11px;color:#94a3b8;}

/* ── Map ── */
#map{flex:1;height:100%;}


</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;">

<!-- Top nav -->
<nav class="top-nav">
  <div class="top-nav-brand">
    <div class="top-nav-mark"></div>
    <span class="top-nav-wordmark">SEERIST</span>
  </div>
  <a class="top-nav-tab" href="index3.html"><i class="fa-solid fa-map"></i>Prototype</a>
  <a class="top-nav-tab active" href="search-map.html"><i class="fa-solid fa-map-location-dot"></i>Search Map</a>
  <a class="top-nav-tab" href="spec3.html"><i class="fa-solid fa-book-open"></i>Spec</a>
  <a class="top-nav-tab" href="build3.html"><i class="fa-solid fa-layer-group"></i>Approach</a>
</nav>

<!-- Search header -->
<div class="search-header">
  <span class="sh-title">New Search</span>
  <span class="sh-count">10,000 results</span>
  <div class="sh-spacer"></div>
  <button class="sh-btn"><i class="fa-regular fa-star"></i> Favourites <i class="fa-solid fa-chevron-down" style="font-size:9px;color:#94a3b8;"></i></button>
  <button class="sh-btn"><i class="fa-solid fa-table-columns"></i> Library <i class="fa-solid fa-chevron-right" style="font-size:9px;color:#94a3b8;"></i></button>
  <button class="sh-save"><i class="fa-solid fa-bookmark"></i> Save as…</button>
</div>

<!-- Search bar -->
<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" value='+protest +(riot | unrest | demonstration) -"peaceful"'/>
    <button class="builder-chip"><i class="fa-solid fa-sliders"></i> Builder</button>
    <i class="fa-solid fa-circle-info info-icon"></i>
  </div>
  <div class="filter-chips">
    <button class="filter-chip"><i class="fa-solid fa-location-dot"></i> Location <i class="fa-solid fa-chevron-down"></i></button>
    <button class="filter-chip"><i class="fa-regular fa-calendar"></i> Date <i class="fa-solid fa-chevron-down"></i></button>
    <button class="filter-chip"><i class="fa-solid fa-layer-group"></i> Content Type <i class="fa-solid fa-chevron-down"></i></button>
    <button class="filter-chip"><i class="fa-solid fa-circle-dot"></i> Status <i class="fa-solid fa-chevron-down"></i></button>
    <button class="filter-chip"><i class="fa-solid fa-sliders"></i> Advanced <i class="fa-solid fa-chevron-down"></i></button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-row">
  <button class="tab-btn" onclick="switchTab(this,'inbox')">Inbox</button>
  <button class="tab-btn active" onclick="switchTab(this,'map')">Map</button>
  <button class="tab-btn" onclick="switchTab(this,'trends')">Trends</button>
</div>

<!-- Main content -->
<div class="main-wrap">

  <!-- Results panel (LEFT) -->
  <div class="results-panel">
    <div class="sort-bar">
      <input type="checkbox" class="sort-check"/>
      <span class="sort-label"><i class="fa-solid fa-sort"></i> First Published</span>
      <div class="sort-spacer"></div>
      <button class="more-btn">···</button>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

  <!-- Map (RIGHT) -->
  <iframe src="map-embed.html?embed" style="flex:1;height:100%;border:none;" title="Map"></iframe>

</div>

<script>
// ── Result data ──────────────────────────────────────────
const RESULTS = [
  {
    id:1, type:'event', time:'now', category:'Geopolitical',
    sev:'low', status:'unverified',
    title:'Foreign Secretary Asad Alam Siam visits Beijing to prepare for Prime Minister Tareq Rahman\'s China trip',
    locs:[{flag:'🇨🇳',name:'Beijing, China'},{flag:'🇨🇳',name:'China'}],
    occurred:'Jun 10, 2026',
    lat:39.9, lng:116.4,
  },
  {
    id:2, type:'news', time:'1m',
    title:'UP Police Constable Exam 2026',
    locs:[{flag:'🇮🇳',name:'India'}],
    source:'bhaskar.com', srcType:'Journalistic', reliability:'Medium Reliability',
    occurred:'Jun 08, 2026 18:01 UTC',
    lat:26.8, lng:80.9,
  },
  {
    id:3, type:'news', time:'1m',
    title:'Massachusetts House Passes Strict Data Privacy Law',
    locs:[{flag:'🇺🇸',name:'Lowell, United States'},{flag:'🇺🇸',name:'Boston, United States'},{flag:'🇺🇸',name:'United States'}],
    source:'elplaneta.com', srcType:'Journalistic', reliability:'Low Reliability',
    occurred:'Jun 08, 2026 20:46 UTC',
    lat:42.3, lng:-71.1,
  },
  {
    id:4, type:'news', time:'1m',
    title:'Woman Injured in DNR Bus Attack Undergoes Further Surgery in Yaroslavl',
    locs:[{flag:'🇷🇺',name:'Yaroslavl, Russia'}],
    source:'ria.ru', srcType:'State Media', reliability:'Low Reliability',
    occurred:'Jun 08, 2026 19:54 UTC',
    lat:57.6, lng:39.8,
  },
  {
    id:5, type:'event', time:'4m', category:'Unrest',
    sev:'medium', status:'verified',
    title:'Protesters block major highway in Santiago demanding pension reform',
    locs:[{flag:'🇨🇱',name:'Santiago, Chile'}],
    occurred:'Jun 08, 2026',
    lat:-33.4, lng:-70.6,
  },
  {
    id:6, type:'news', time:'6m',
    title:'French unions call nationwide strike over proposed retirement age increase',
    locs:[{flag:'🇫🇷',name:'Paris, France'},{flag:'🇫🇷',name:'France'}],
    source:'lemonde.fr', srcType:'Journalistic', reliability:'High Reliability',
    occurred:'Jun 08, 2026 17:30 UTC',
    lat:48.85, lng:2.35,
  },
  {
    id:7, type:'event', time:'12m', category:'Terrorism',
    sev:'high', status:'breaking',
    title:'Suicide bombing at crowded market leaves at least 14 dead in Mogadishu',
    locs:[{flag:'🇸🇴',name:'Mogadishu, Somalia'}],
    occurred:'Jun 08, 2026',
    lat:2.05, lng:45.34,
  },
  {
    id:8, type:'news', time:'14m',
    title:'Israeli military conducts overnight airstrikes on southern Lebanon',
    locs:[{flag:'🇮🇱',name:'Israel'},{flag:'🇱🇧',name:'Southern Lebanon'}],
    source:'reuters.com', srcType:'Wire Service', reliability:'High Reliability',
    occurred:'Jun 08, 2026 16:14 UTC',
    lat:33.5, lng:35.5,
  },
  {
    id:9, type:'event', time:'21m', category:'Conflict',
    sev:'high', status:'unverified',
    title:'Artillery exchange reported along disputed border region near Sumy',
    locs:[{flag:'🇺🇦',name:'Sumy Oblast, Ukraine'}],
    occurred:'Jun 08, 2026',
    lat:50.9, lng:34.8,
  },
  {
    id:10, type:'news', time:'28m',
    title:'Venezuelan opposition claims electoral fraud after local election results',
    locs:[{flag:'🇻🇪',name:'Caracas, Venezuela'},{flag:'🇻🇪',name:'Venezuela'}],
    source:'el-nacional.com', srcType:'Journalistic', reliability:'Medium Reliability',
    occurred:'Jun 08, 2026 15:02 UTC',
    lat:10.5, lng:-66.9,
  },
  {
    id:11, type:'event', time:'35m', category:'Maritime',
    sev:'medium', status:'verified',
    title:'Houthi drone targets oil tanker in Gulf of Aden, crew evacuated safely',
    locs:[{flag:'🇾🇪',name:'Gulf of Aden'},{flag:'🇾🇪',name:'Yemen'}],
    occurred:'Jun 08, 2026',
    lat:12.5, lng:44.5,
  },
  {
    id:12, type:'news', time:'41m',
    title:'Pakistan floods kill 38 as monsoon season begins early in Sindh province',
    locs:[{flag:'🇵🇰',name:'Sindh, Pakistan'},{flag:'🇵🇰',name:'Pakistan'}],
    source:'dawn.com', srcType:'Journalistic', reliability:'High Reliability',
    occurred:'Jun 08, 2026 14:20 UTC',
    lat:25.9, lng:68.9,
  },
];


// ── Render results ────────────────────────────────────────
function renderResults(){
  const list = document.getElementById('resultsList');
  list.innerHTML = RESULTS.map(r => {
    const isEvent = r.type === 'event';
    const isNews  = r.type === 'news';

    // Top row
    const typeIcon = isNews  ? '<i class="fa-regular fa-newspaper card-type-icon"></i>' :
                     isEvent ? '' : '';

    const sevChip = r.sev ? `<span class="chip chip-sev-${r.sev}">${r.sev === 'low' ? 'Low Severity' : r.sev === 'medium' ? 'Medium Severity' : 'High Severity'}</span>` : '';

    const statusMap = {verified:'Verified',unverified:'Unverified',breaking:'Breaking',future:'Future'};
    const statusChip = r.status ? `<span class="chip chip-status-${r.status}">${statusMap[r.status]}</span>` : '';

    const catLabel = r.category ? `<span class="card-cat">${r.category}</span>` : '';

    const topRow = `<div class="card-top-row">
      <input type="checkbox" class="card-check" onclick="event.stopPropagation()"/>
      ${typeIcon}
      <span class="card-time">${r.time}</span>
      ${catLabel}
      ${sevChip}${statusChip}
      <button class="card-more" onclick="event.stopPropagation()">···</button>
    </div>`;

    // Locations
    const locs = (r.locs || []).map(l => `<span class="card-loc"><span class="card-loc-flag">${l.flag}</span>${l.name}</span>`).join('');
    const locsHtml = locs ? `<div class="card-locations">${locs}</div>` : '';

    // Source (news)
    const sourceHtml = r.source ? `<div class="card-source">${r.source}${r.srcType ? ' · ' + r.srcType : ''}${r.reliability ? ' · ' + r.reliability : ''}</div>` : '';

    return `<div class="result-card" id="card-${r.id}" onclick="selectResult(${r.id})">
      ${topRow}
      <div class="card-title">${r.title}</div>
      ${locsHtml}
      ${sourceHtml}
      <div class="card-occurred">Occurred ${r.occurred}</div>
    </div>`;
  }).join('');
}
renderResults();

// ── Tab switching ─────────────────────────────────────────
function switchTab(btn, tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Select result ─────────────────────────────────────────
let activeId = null;

function selectResult(id){
  if(activeId) document.getElementById(`card-${activeId}`)?.classList.remove('active');
  activeId = id;
  document.getElementById(`card-${id}`)?.classList.add('active');
  document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
</body>
</html>
